<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | Lala Zar | Tours & Travel Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader"><div class="loader-inner"></div></div>
    <div class="cursor-dot"></div>
    <div class="cursor-follower"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="text-center mb-5">
                <a class="navbar-brand" href="index.html">Lala Zar <span>Tours & Travel Agency</span></a>
            </div>
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="admin-bookings.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a href="admin-destinations.html" class="sidebar-link"><i class="fas fa-map-marked-alt"></i> Destinations</a>
            <a href="admin-customers.html" class="sidebar-link"><i class="fas fa-users"></i> Customers</a>
            <a href="admin-settings.html" class="sidebar-link active"><i class="fas fa-cog"></i> Settings</a>
            <div class="mt-auto">
                <a href="index.html" class="sidebar-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-primary d-md-none me-3" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                    <h2 class="mb-0">Admin Settings</h2>
                </div>
                <div class="d-flex align-items-center">
                    <button class="theme-toggle me-3" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <div class="dropdown">
                        <img src="https://i.pravatar.cc/150?u=admin" alt="Admin" class="rounded-circle" width="40" height="40">
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="stat-card">
                        <h5 class="mb-4">Profile Settings</h5>
                        <div class="text-center mb-4">
                            <div class="position-relative d-inline-block">
                                <img src="https://i.pravatar.cc/150?u=admin" class="rounded-circle mb-3" width="100" height="100">
                                <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle"><i class="fas fa-camera"></i></button>
                            </div>
                            <h6 class="mb-0">Admin User</h6>
                            <p class="text-muted small">Super Admin</p>
                        </div>
                        <form>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Display Name</label>
                                <input type="text" class="form-control" value="Admin User">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control" value="admin@toursproject.com">
                            </div>
                            <button class="btn btn-premium w-100">Update Profile</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="stat-card mb-4">
                        <h5 class="mb-4">System Configuration</h5>
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Site Name</label>
                                    <input type="text" class="form-control" value="Tours Project">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Contact Email</label>
                                    <input type="email" class="form-control" value="support@toursproject.com">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Currency</label>
                                    <select class="form-select">
                                        <option value="USD" selected>USD ($)</option>
                                        <option value="EUR">EUR (€)</option>
                                        <option value="GBP">GBP (£)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Timezone</label>
                                    <select class="form-select">
                                        <option value="UTC" selected>UTC</option>
                                        <option value="EST">EST</option>
                                        <option value="PST">PST</option>
                                    </select>
                                </div>
                                <div class="col-12 mt-4">
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" checked>
                                        <label class="form-check-label">Enable Email Notifications</label>
                                    </div>
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" checked>
                                        <label class="form-check-label">Maintenance Mode</label>
                                    </div>
                                    <button class="btn btn-premium">Save Changes</button>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="stat-card">
                        <h5 class="mb-4 text-danger">Danger Zone</h5>
                        <p class="text-muted small">Once you delete your account, there is no going back. Please be certain.</p>
                        <button class="btn btn-outline-danger">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
